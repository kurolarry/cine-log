<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ciné-Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --forest:   #435334;
      --moss:     #7a9460;
      --bark:     #6b4f3a;
      --cream:    #f5f0e8;
      --parchment:#ede6d6;
      --text:     #2c2418;
      --muted:    #7a6e60;
      --card-bg:  #faf7f2;
      --border:   #d9cfc0;
      --danger:   #9b3a2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--forest);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      color: var(--cream);
      font-size: 1.6rem;
      letter-spacing: 0.02em;
    }
    header h1 span { color: var(--parchment); opacity: .7; font-weight: 400; font-size: 1rem; margin-left: .5rem; }
    #userInfo {
      color: var(--parchment);
      font-size: .85rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    #userInfo button {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: var(--cream);
      padding: .35rem .85rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: .8rem;
      font-family: 'DM Sans', sans-serif;
      transition: background .2s;
    }
    #userInfo button:hover { background: rgba(255,255,255,.25); }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── AUTH ── */
    #authView {
      display: none;
      min-height: calc(100vh - 66px);
      align-items: center;
      justify-content: center;
      background: var(--cream);
    }
    #authView.active { display: flex; }

    .auth-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem 2.8rem;
      width: 100%;
      max-width: 400px;
    }
    .auth-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--forest);
      margin-bottom: 1.5rem;
    }
    .auth-tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }
    .auth-tab {
      flex: 1;
      padding: .5rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      color: var(--muted);
      transition: all .2s;
    }
    .auth-tab.active {
      background: var(--forest);
      color: var(--cream);
      border-color: var(--forest);
    }

    /* ── FORM ELEMENTS ── */
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .4rem;
    }
    input, select {
      width: 100%;
      padding: .65rem .9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      background: #fff;
      color: var(--text);
      transition: border-color .2s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--moss); }

    .btn-primary {
      width: 100%;
      padding: .75rem;
      background: var(--forest);
      color: var(--cream);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .2s;
    }
    .btn-primary:hover { background: var(--bark); }

    .msg {
      margin-top: .75rem;
      padding: .6rem .9rem;
      border-radius: 8px;
      font-size: .85rem;
      display: none;
    }
    .msg.error { background: #f9e8e6; color: var(--danger); display: block; }
    .msg.success { background: #e8f0e3; color: var(--forest); display: block; }

    /* ── APP VIEW ── */
    #appView { padding: 2rem; max-width: 1100px; margin: 0 auto; }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .app-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--forest);
    }
    .app-header h2 span {
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      color: var(--muted);
      font-weight: 400;
      margin-left: .4rem;
    }

    /* ── ADD FILM FORM ── */
    .add-form {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .add-form h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--forest);
      margin-bottom: 1rem;
    }
    .form-row {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
    }
    .form-row .form-group { flex: 1; min-width: 140px; }
    .form-row .form-group.wide { flex: 2; min-width: 200px; }
    .btn-add {
      padding: .65rem 1.4rem;
      background: var(--forest);
      color: var(--cream);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      align-self: flex-end;
      margin-bottom: 1rem;
      transition: background .2s;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--bark); }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: .35rem .9rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: .83rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active {
      background: var(--forest);
      color: var(--cream);
      border-color: var(--forest);
    }

    /* ── MOVIE GRID ── */
    #movieGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .movie-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      transition: box-shadow .2s, transform .15s;
      position: relative;
    }
    .movie-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(67,83,52,.1); }

    .card-genre {
      font-size: .72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--moss);
    }
    .card-titre {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--text);
      line-height: 1.3;
    }
    .card-note {
      font-size: .8rem;
      color: var(--muted);
    }
    .card-note strong { color: var(--bark); }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: .3rem;
    }

    .badge {
      padding: .25rem .65rem;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }
    .badge.vu { background: #e8f0e3; color: var(--forest); }
    .badge.a-voir { background: #f0ece4; color: var(--bark); }
    .badge:hover { opacity: .8; }

    .btn-delete {
      background: transparent;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: .2rem .4rem;
      border-radius: 6px;
      transition: color .2s, background .2s;
    }
    .btn-delete:hover { color: var(--danger); background: #f9e8e6; }

    /* ── EMPTY STATE ── */
    #emptyState {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      display: none;
    }
    #emptyState p { font-size: 1rem; }
    #emptyState .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }

    /* ── LOADING ── */
    .loader {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: .9rem;
    }

    @media (max-width: 600px) {
      #appView { padding: 1rem; }
      .auth-box { padding: 1.75rem 1.5rem; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎬 Ciné-Log <span>Ma cinémathèque</span></h1>
  <div id="userInfo" style="display:none">
    <span id="pseudoDisplay"></span>
    <button onclick="logout()">Se déconnecter</button>
  </div>
</header>

<!-- ── VUE AUTH ── -->
<div id="authView" class="view">
  <div class="auth-box">
    <h2>Bienvenue</h2>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchTab('register')">Inscription</button>
    </div>

    <!-- Connexion -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="votre@email.fr"/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" onclick="login()">Se connecter</button>
      <div class="msg" id="loginMsg"></div>
    </div>

    <!-- Inscription -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Pseudo</label>
        <input type="text" id="regPseudo" placeholder="CinéFan42"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="votre@email.fr"/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="regPassword" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" onclick="register()">Créer mon compte</button>
      <div class="msg" id="registerMsg"></div>
    </div>
  </div>
</div>

<!-- ── VUE APPLICATION ── -->
<div id="appView" class="view">

  <div class="app-header">
    <h2>Ma collection <span id="movieCount"></span></h2>
  </div>

  <!-- Formulaire d'ajout -->
  <div class="add-form">
    <h3>Ajouter un film</h3>
    <div class="form-row">
      <div class="form-group wide">
        <label>Titre *</label>
        <input type="text" id="newTitre" placeholder="Ex : Parasite"/>
      </div>
      <div class="form-group">
        <label>Genre</label>
        <select id="newGenre">
          <option value="">— Genre —</option>
          <option>Action</option>
          <option>Comédie</option>
          <option>Drame</option>
          <option>Fantastique</option>
          <option>Horreur</option>
          <option>Romance</option>
          <option>Science-fiction</option>
          <option>Thriller</option>
          <option>Animation</option>
          <option>Documentaire</option>
        </select>
      </div>
      <div class="form-group">
        <label>Note (1-10)</label>
        <input type="number" id="newNote" min="1" max="10" placeholder="—"/>
      </div>
      <div class="form-group">
        <label>Statut</label>
        <select id="newStatut">
          <option value="à voir">À voir</option>
          <option value="vu">Vu</option>
        </select>
      </div>
      <button class="btn-add" onclick="addMovie()">+ Ajouter</button>
    </div>
    <div class="msg" id="addMsg"></div>
  </div>

  <!-- Filtres -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('tous', this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('vu', this)">Vus ✓</button>
    <button class="filter-btn" onclick="setFilter('à voir', this)">À voir</button>
  </div>

  <!-- Grille de films -->
  <div id="movieGrid">
    <div class="loader">Chargement…</div>
  </div>

  <div id="emptyState">
    <div class="empty-icon">🎞️</div>
    <p>Aucun film dans cette catégorie.<br/>Ajoutez votre premier film ci-dessus !</p>
  </div>

</div>

<script>
  // ─────────────────────────────────────────────
  //  CONFIG : remplacez si votre serveur tourne sur un autre port
  // ─────────────────────────────────────────────
  const API = 'http://localhost:3000/api';

  let token     = localStorage.getItem('cinelog_token');
  let allMovies = [];
  let activeFilter = 'tous';

  // ─────────────────────────────────────────────
  //  INIT
  // ─────────────────────────────────────────────
  function init() {
    if (token) {
      showApp();
      loadMovies();
    } else {
      showAuth();
    }
  }

  function showAuth() {
    document.getElementById('authView').classList.add('active');
    document.getElementById('appView').classList.remove('active');
    document.getElementById('userInfo').style.display = 'none';
  }

  function showApp() {
    // Décode le pseudo depuis le token (partie payload en base64)
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      document.getElementById('pseudoDisplay').textContent = '👋 ' + payload.pseudo;
    } catch {}

    document.getElementById('authView').classList.remove('active');
    document.getElementById('appView').classList.add('active');
    document.getElementById('userInfo').style.display = 'flex';
  }

  // ─────────────────────────────────────────────
  //  AUTH TABS
  // ─────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    document.getElementById('loginForm').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  }

  // ─────────────────────────────────────────────
  //  INSCRIPTION
  // ─────────────────────────────────────────────
  async function register() {
    const pseudo   = document.getElementById('regPseudo').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const msg      = document.getElementById('registerMsg');

    if (!pseudo || !email || !password) {
      return showMsg(msg, 'Tous les champs sont requis.', 'error');
    }

    try {
      const res  = await fetch(`${API}/auth/register`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ pseudo, email, password })
      });
      const data = await res.json();

      if (!res.ok) return showMsg(msg, data.message, 'error');

      showMsg(msg, 'Compte créé ! Vous pouvez vous connecter.', 'success');
    } catch {
      showMsg(msg, 'Impossible de joindre le serveur.', 'error');
    }
  }

  // ─────────────────────────────────────────────
  //  CONNEXION
  // ─────────────────────────────────────────────
  async function login() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msg      = document.getElementById('loginMsg');

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) return showMsg(msg, data.message, 'error');

      // Stockage du JWT dans localStorage
      token = data.token;
      localStorage.setItem('cinelog_token', token);

      showApp();
      loadMovies();
    } catch {
      showMsg(msg, 'Impossible de joindre le serveur.', 'error');
    }
  }

  // ─────────────────────────────────────────────
  //  DÉCONNEXION
  // ─────────────────────────────────────────────
  function logout() {
    token = null;
    localStorage.removeItem('cinelog_token');
    allMovies = [];
    showAuth();
  }

  // ─────────────────────────────────────────────
  //  CHARGEMENT DES FILMS
  // ─────────────────────────────────────────────
  async function loadMovies() {
    try {
      const res = await fetch(`${API}/movies`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      // Si le token est expiré, on renvoie vers la connexion
      if (res.status === 401 || res.status === 403) {
        logout();
        return;
      }

      allMovies = await res.json();
      renderMovies();
    } catch {
      document.getElementById('movieGrid').innerHTML =
        '<p style="color:var(--muted);padding:1rem">Erreur de chargement.</p>';
    }
  }

  // ─────────────────────────────────────────────
  //  AFFICHAGE (avec filtre)
  // ─────────────────────────────────────────────
  function renderMovies() {
    const filtered = activeFilter === 'tous'
      ? allMovies
      : allMovies.filter(m => m.statut === activeFilter);

    const grid  = document.getElementById('movieGrid');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('movieCount');

    count.textContent = `(${allMovies.length} film${allMovies.length > 1 ? 's' : ''})`;

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    grid.innerHTML = filtered.map(m => `
      <div class="movie-card" id="card-${m.id}">
        <div class="card-genre">${m.genre || 'Sans genre'}</div>
        <div class="card-titre">${escHtml(m.titre)}</div>
        ${m.note ? `<div class="card-note">Note : <strong>${m.note}/10</strong></div>` : ''}
        <div class="card-footer">
          <button class="badge ${m.statut === 'vu' ? 'vu' : 'a-voir'}"
                  onclick="toggleStatut(${m.id}, '${m.statut}')">
            ${m.statut === 'vu' ? '✓ Vu' : '⏳ À voir'}
          </button>
          <button class="btn-delete" title="Supprimer" onclick="deleteMovie(${m.id})">✕</button>
        </div>
      </div>
    `).join('');
  }

  // ─────────────────────────────────────────────
  //  AJOUT D'UN FILM
  // ─────────────────────────────────────────────
  async function addMovie() {
    const titre  = document.getElementById('newTitre').value.trim();
    const genre  = document.getElementById('newGenre').value;
    const note   = document.getElementById('newNote').value;
    const statut = document.getElementById('newStatut').value;
    const msg    = document.getElementById('addMsg');

    if (!titre) return showMsg(msg, 'Le titre est obligatoire.', 'error');

    try {
      const res = await fetch(`${API}/movies`, {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ titre, genre, note: note || null, statut })
      });
      const data = await res.json();

      if (!res.ok) return showMsg(msg, data.message, 'error');

      // Remise à zéro du formulaire
      document.getElementById('newTitre').value = '';
      document.getElementById('newGenre').value = '';
      document.getElementById('newNote').value  = '';

      showMsg(msg, '🎬 Film ajouté !', 'success');
      loadMovies(); // Rechargement de la liste
    } catch {
      showMsg(msg, 'Erreur lors de l\'ajout.', 'error');
    }
  }

  // ─────────────────────────────────────────────
  //  SUPPRESSION
  // ─────────────────────────────────────────────
  async function deleteMovie(id) {
    if (!confirm('Supprimer ce film ?')) return;

    try {
      const res = await fetch(`${API}/movies/${id}`, {
        method:  'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.ok) {
        // Suppression locale sans rechargement complet (plus rapide)
        allMovies = allMovies.filter(m => m.id !== id);
        renderMovies();
      }
    } catch {
      alert('Erreur lors de la suppression.');
    }
  }

  // ─────────────────────────────────────────────
  //  TOGGLE VU / À VOIR  (PATCH optionnel)
  //  Si vous ajoutez la route PATCH /api/movies/:id côté serveur,
  //  décommentez l'appel fetch ci-dessous.
  // ─────────────────────────────────────────────
  async function toggleStatut(id, statutActuel) {
    const nouveauStatut = statutActuel === 'vu' ? 'à voir' : 'vu';

    // Mise à jour optimiste en local (UX fluide)
    const film = allMovies.find(m => m.id === id);
    if (film) film.statut = nouveauStatut;
    renderMovies();

    /* Décommentez quand vous aurez la route PATCH :
    try {
      await fetch(`${API}/movies/${id}`, {
        method:  'PATCH',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ statut: nouveauStatut })
      });
    } catch {}
    */
  }

  // ─────────────────────────────────────────────
  //  FILTRES
  // ─────────────────────────────────────────────
  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMovies();
  }

  // ─────────────────────────────────────────────
  //  UTILITAIRES
  // ─────────────────────────────────────────────
  function showMsg(el, text, type) {
    el.textContent = text;
    el.className   = `msg ${type}`;
    setTimeout(() => { el.className = 'msg'; }, 3500);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Lancement
  init();
</script>
</body>
</html>
